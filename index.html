<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My World</title>
<style>
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fce4ec; color: #222; display: flex; align-items: center; justify-content: center; height: 100vh; }
  .card { background: white; padding: 36px 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,.08); max-width: 480px; text-align: center; }
  h1 { margin: 0 0 8px; font-size: 28px; }
  p { margin: 0 0 18px; color: #555; }
  a { color: #ad1457; font-weight: 600; }
</style>
</head>
<body>
<!--
  Temporary redirect stub. The real landing page lands in the next commit.
  Anyone whose device already has a child slug (the Fletcher iPad, etc.) gets
  bounced straight to their app so the home-screen tile keeps working through
  the URL restructure.
-->
<script>
  (function () {
    var slug = localStorage.getItem('aacChildSlug');
    // Legacy fallback: if there's no slug yet but the device has an admin token,
    // it's the existing Fletcher iPad coming from before this restructure.
    if (!slug && localStorage.getItem('aacToken')) slug = 'fletcherpeterson';
    if (slug) {
      location.replace('/u/' + encodeURIComponent(slug));
    }
  })();
</script>
<div class="card">
  <h1>My World</h1>
  <p>Tap to talk. Coming soon.</p>
  <p><a href="/u/fletcherpeterson">Demo →</a></p>
</div>
</body>
</html>

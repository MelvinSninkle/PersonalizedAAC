<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Private preview · My World</title>
<meta name="theme-color" content="#ff1493">
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  :root { --pink:#ff1493; --pink-deep:#ad1457; --ink:#1f2937; --muted:#6b7280; --line:#fce4ec; --danger:#dc2626; }
  html,body { margin:0; min-height:100%; background:linear-gradient(180deg,#fff7fb,#ffeaf4);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; color:var(--ink); }
  .scrim { min-height:100vh; display:grid; place-items:center; padding:24px;
    background:radial-gradient(120% 120% at 50% 0%, rgba(255,20,147,.10), transparent 60%); }
  .card { background:#fff; border:1px solid var(--line); border-radius:22px; padding:32px 30px; width:100%; max-width:400px;
    box-shadow:0 24px 60px rgba(255,20,147,.18); text-align:center; }
  .brand { font-family:'Fredoka',ui-rounded,system-ui,sans-serif; font-weight:700; color:var(--pink-deep); font-size:26px; }
  .tag { color:var(--muted); font-size:14px; margin:8px 0 4px; }
  .sub { color:var(--muted); font-size:13px; margin:0 0 22px; }
  label { display:block; font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin:0 0 6px; text-align:left; }
  input { width:100%; padding:13px 14px; border:1px solid var(--line); border-radius:12px; font:inherit; text-align:center; letter-spacing:.06em; }
  input:focus { outline:none; border-color:var(--pink); }
  button { width:100%; margin-top:16px; border:none; cursor:pointer; font:inherit; font-weight:700; font-size:15px; border-radius:999px;
    padding:13px; background:var(--pink); color:#fff; }
  button:hover { background:var(--pink-deep); }
  button:disabled { opacity:.55; cursor:default; }
  .msg { font-size:13px; margin-top:14px; min-height:18px; color:var(--danger); }
  .foot { margin-top:14px; font-size:12px; color:var(--muted); }
  .foot a { color:var(--pink-deep); font-weight:600; }
</style>
</head>
<body>
<div class="scrim">
  <div class="card">
    <div class="brand"><img src="/icons/myworld-globe.png" alt="" style="height:1.5em;width:auto;vertical-align:middle;margin-right:.12em;"> My World</div>
    <div class="tag">Private preview</div>
    <p class="sub">This early build is invite-only. Enter the code you were given to continue.</p>
    <form id="gate-form" novalidate>
      <label for="code">Invite code</label>
      <input id="code" type="text" autocomplete="off" autocapitalize="characters" spellcheck="false" placeholder="Enter code" required>
      <button type="submit" id="go">Enter →</button>
    </form>
    <div class="msg" id="msg"></div>
    <p class="foot">Already have an account? <a href="/login">Sign in</a> — no code needed.</p>
    <p class="foot">Don't have a code? Ask your clinic or the My World team.</p>
  </div>
</div>
<script>
(() => {
  const form = document.getElementById('gate-form');
  const input = document.getElementById('code');
  const btn = document.getElementById('go');
  const msg = document.getElementById('msg');
  input.focus();

  // Where to land after the gate. Only allow same-origin paths (no open redirect).
  function safeNext() {
    try {
      const n = new URLSearchParams(location.search).get('next');
      if (n && n.startsWith('/') && !n.startsWith('//')) return n;
    } catch (_) {}
    return '/';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const code = input.value.trim();
    msg.textContent = '';
    if (!code) { msg.textContent = 'Enter your invite code.'; input.focus(); return; }
    const prev = btn.textContent;
    btn.disabled = true; btn.textContent = 'Checking…';
    try {
      const r = await fetch('/api/invite', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ code }) });
      if (r.ok) { location.replace(safeNext()); return; }
      const d = await r.json().catch(() => ({}));
      msg.textContent = d.error || "That code didn't work.";
    } catch (_) {
      msg.textContent = 'Network error — please try again.';
    }
    btn.disabled = false; btn.textContent = prev;
  });
})();
</script>
</body>
</html>

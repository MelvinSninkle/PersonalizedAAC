# XcodeGen spec — generates MyWorld.xcodeproj from this file.
# Regenerate after editing:   xcodegen generate   (run inside kid-ios/)
# Install xcodegen once:      brew install xcodegen

name: MyWorld
options:
  bundleIdPrefix: io.andrewpeterson
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    # Bump for every TestFlight upload — Apple requires a unique
    # version+build combo per upload (a duplicate fails with "Upload failed").
    CURRENT_PROJECT_VERSION: "2"
    DEVELOPMENT_TEAM: ""               # set this in Xcode the first time
    CODE_SIGN_STYLE: Automatic
    ENABLE_PREVIEWS: YES
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  MyWorld:
    type: application
    platform: iOS
    sources:
      - path: MyWorld
        excludes:
          - "**/*.md"
    info:
      path: MyWorld/Info.plist
      properties:
        CFBundleDisplayName: My World
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: ""
        UIStatusBarHidden: true
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        UIBackgroundModes:
          - audio
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        # Camera + Photos are required for the in-app "Add a tile" flow.
        # Without these strings, iOS silently denies access and the picker
        # never appears, which reads to the parent as "the button is broken."
        NSCameraUsageDescription: "Take photos of the things you want your child to see on the board — pets, family, snacks, places. The app turns each photo into a styled tile with the AI."
        NSPhotoLibraryUsageDescription: "Choose photos from your library to add as tiles on the board. The app turns each photo into a styled tile with the AI."
        NSMicrophoneUsageDescription: "Record your own voice for a tile, and power Listening Mode so spoken words turn into picture tiles on the board."
        NSSpeechRecognitionUsageDescription: "Listening Mode turns speech near the iPad into your child's picture tiles, live on the board. Recognition runs on-device when available."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.andrewpeterson.myworld
        TARGETED_DEVICE_FAMILY: "1,2"     # iPhone + iPad
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        # Sign in with Apple — required to be on at least equal footing
        # with any other login per App Store Review Guideline 4.8, and
        # the primary auth path in onboarding.
        CODE_SIGN_ENTITLEMENTS: MyWorld/MyWorld.entitlements

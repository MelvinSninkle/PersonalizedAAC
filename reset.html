<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Reset password · My World</title>
<meta name="theme-color" content="#ff1493">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  :root { --pink:#ff1493; --pink-deep:#ad1457; --ink:#1f2937; --muted:#6b7280; --line:#fce4ec; --danger:#dc2626; --good:#16a34a; }
  html,body { margin:0; min-height:100%; background:linear-gradient(180deg,#fff7fb,#ffeaf4);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; color:var(--ink); }
  .wrap { min-height:100vh; display:grid; place-items:center; padding:24px; }
  .card { background:#fff; border:1px solid var(--line); border-radius:22px; padding:30px; width:100%; max-width:380px;
    box-shadow:0 18px 50px rgba(255,20,147,.12); }
  .brand { font-family:'Fredoka',ui-rounded,system-ui,sans-serif; font-weight:700; color:var(--pink-deep); font-size:24px; text-align:center; }
  .tag { text-align:center; color:var(--muted); font-size:13px; margin:4px 0 22px; }
  label { display:block; font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin:0 0 6px; }
  input { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:11px; font:inherit; margin-bottom:14px; }
  button { width:100%; border:none; cursor:pointer; font:inherit; font-weight:700; font-size:15px; border-radius:999px; padding:13px; background:var(--pink); color:#fff; }
  button:hover { background:var(--pink-deep); }
  .msg { font-size:13px; margin-top:14px; min-height:18px; }
  .msg.err { color:var(--danger); } .msg.ok { color:var(--good); }
  .links { margin-top:18px; text-align:center; font-size:13px; }
  .links a { color:var(--pink-deep); font-weight:600; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="brand"><img src="/icons/myworld-globe.png" alt="" style="height:1.5em;width:auto;vertical-align:middle;margin-right:.12em;"> My World</div>
    <div class="tag">Choose a new password</div>
    <form id="form" novalidate>
      <label for="password">New password (min 8 chars)</label>
      <input id="password" type="password" autocomplete="new-password" placeholder="••••••••" required>
      <button type="submit" id="btn">Set new password</button>
    </form>
    <div class="msg" id="msg"></div>
    <div class="links"><a href="/login">Back to sign in</a></div>
  </div>
</div>
<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const token = new URLSearchParams(location.search).get('token') || '';
  if (!token) { $('msg').className = 'msg err'; $('msg').textContent = 'Missing reset token. Use the link from your reset email.'; }
  $('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const msg = $('msg'); msg.className = 'msg'; msg.textContent = '';
    const r = await fetch('/api/auth/reset', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, password: $('password').value }) });
    const data = await r.json().catch(() => ({}));
    if (r.ok && data.ok) {
      msg.className = 'msg ok'; msg.textContent = 'Password updated. Redirecting to sign in…';
      setTimeout(() => location.assign('/login'), 1200);
    } else {
      msg.className = 'msg err'; msg.textContent = data.error || 'Could not reset password.';
    }
  });
})();
</script>

<div style="text-align:center;font-size:12px;color:#9ca3af;padding:18px 10px;">© Extelligence LLC · <a href="/terms" style="color:#c2185b;">Terms</a> · <a href="/privacy" style="color:#c2185b;">Privacy</a> · My World supports communication practice at home — it isn’t a medical device and doesn’t replace your child’s care team.</div>
</body>
</html>

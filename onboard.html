<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Set up tiles · My World</title>
<meta name="theme-color" content="#ff1493">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<!--
  Onboarding capture + review. Snap photos as you walk the house; each upload
  returns instantly and the server renders the name, pronunciation, art, and
  voice in the background. The review list below fills in as drafts finish —
  reviewing the early ones gives the later ones time to render. Nothing goes
  live until you tap Approve.
-->
<style>
  * { box-sizing: border-box; }
  :root { --pink:#ff1493; --pink-deep:#ad1457; --ink:#1f2937; --muted:#6b7280; --faint:#9ca3af; --line:#fce4ec; --bg:#fdf2f8; --good:#16a34a; --danger:#dc2626; }
  html,body { margin:0; background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; line-height:1.5; }
  .fred { font-family:'Fredoka',ui-rounded,system-ui,sans-serif; }
  header { position:sticky; top:0; z-index:10; background:rgba(255,255,255,.96); backdrop-filter:blur(8px); border-bottom:1px solid var(--line); padding:14px 18px; }
  header .brand { font-family:'Fredoka',system-ui; font-weight:700; color:var(--pink-deep); font-size:19px; }
  header .sub { font-size:13px; color:var(--muted); }
  .wrap { max-width:760px; margin:0 auto; padding:18px; }
  .panel { background:#fff; border:1px solid var(--line); border-radius:16px; padding:16px; margin-bottom:16px; }
  label { display:block; font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin:0 0 6px; }
  select, input[type=text] { width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:10px; font:inherit; }
  .btn { border:none; cursor:pointer; font:inherit; font-weight:700; border-radius:999px; padding:13px 18px; background:var(--pink); color:#fff; font-size:15px; }
  .btn:hover { background:var(--pink-deep); }
  .btn.ghost { background:#fff0f6; color:var(--pink-deep); }
  .btn.tiny { padding:8px 13px; font-size:13px; }
  .btn.ok { background:var(--good); }
  .btn.no { background:#fff0f0; color:var(--danger); }
  .capture-row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-top:12px; }
  .count { font-family:'Fredoka',system-ui; font-weight:700; color:var(--pink-deep); font-size:15px; }
  .cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px; }
  .card { border:1px solid var(--line); border-radius:14px; padding:12px; background:#fff; }
  .card .thumb { width:100%; aspect-ratio:1; border-radius:10px; background:#fff7fb center/cover no-repeat; display:grid; place-items:center; color:var(--faint); font-size:13px; text-align:center; overflow:hidden; }
  .card .thumb img { width:100%; height:100%; object-fit:cover; }
  .card input[type=text] { margin-top:8px; }
  .card .pron { font-size:12px; color:#666; }
  .card .row { display:flex; gap:8px; margin-top:8px; }
  .card .row .btn { flex:1; }
  .empty { color:var(--faint); font-size:14px; text-align:center; padding:24px; }
  .spin { width:26px; height:26px; border:3px solid #fce4ec; border-top-color:var(--pink); border-radius:50%; animation:spin 0.9s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<header>
  <div class="brand fred">🌍 Set up <span id="child-name">Fletcher</span>'s tiles</div>
  <div class="sub">Snap as you walk — names, art, and voice render in the background. Approve what looks right.</div>
</header>
<div class="wrap">
  <div class="panel">
    <label for="ob-style">Art style for new photos</label>
    <select id="ob-style">
      <option value="Pixar-style 3D animated render">3D Animated</option>
      <option value="flat picture-book illustration">Picture Book</option>
      <option value="soft watercolor illustration">Watercolor</option>
      <option value="gentle soft storybook illustration">Soft Storybook</option>
      <option value="needle-felted wool craft">Felted</option>
      <option value="">Keep original photos (just name them)</option>
    </select>
    <div class="capture-row">
      <button class="btn" id="ob-take">📸 Take a photo</button>
      <button class="btn ghost" id="ob-choose">🖼 Choose photos</button>
      <span class="count" id="ob-count"></span>
    </div>
    <input type="file" id="ob-camera" accept="image/*" capture="environment" style="display:none;">
    <input type="file" id="ob-library" accept="image/*" multiple style="display:none;">
  </div>

  <h3 class="fred" style="margin:6px 2px;">Review</h3>
  <div class="cards" id="ob-cards"><div class="empty">No photos yet — snap one above to begin.</div></div>
</div>

<audio id="ob-audio" preload="none"></audio>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const m = location.pathname.match(/^\/onboard\/([^\/]+)/);
  const slug = m ? decodeURIComponent(m[1]) : 'fletcherpeterson';
  $('child-name').textContent = (slug.replace(/peterson$/i, '').replace(/^\w/, c => c.toUpperCase())) || 'Fletcher';
  try { const ss = localStorage.getItem('aacStyle'); if (ss) for (const o of $('ob-style').options) if (o.value === ss) { $('ob-style').value = ss; break; } } catch (_) {}
  $('ob-style').addEventListener('change', () => { try { localStorage.setItem('aacStyle', $('ob-style').value); } catch (_) {} });

  let snapped = 0;
  function setCount() { $('ob-count').textContent = snapped ? snapped + ' sent' : ''; }

  async function downscale(file, max = 1024, q = 0.85) {
    try {
      const bmp = await createImageBitmap(file);
      const scale = Math.min(1, max / Math.max(bmp.width, bmp.height));
      const w = Math.round(bmp.width * scale), h = Math.round(bmp.height * scale);
      const c = document.createElement('canvas'); c.width = w; c.height = h;
      c.getContext('2d').drawImage(bmp, 0, 0, w, h); if (bmp.close) bmp.close();
      const blob = await new Promise(r => c.toBlob(r, 'image/jpeg', q));
      return (blob && blob.size < file.size) ? blob : file;
    } catch (_) { return file; }
  }
  async function queuePhoto(file) {
    const style = $('ob-style').value;
    const blob = await downscale(file);
    snapped++; setCount();
    // Fire and forget — the server renders in the background; the review list polls.
    fetch('/api/pending?childId=' + encodeURIComponent(slug) + '&style=' + encodeURIComponent(style),
      { method: 'POST', headers: { 'Content-Type': 'image/jpeg' }, body: blob, credentials: 'same-origin' })
      .then(() => poll()).catch(() => {});
  }
  $('ob-take').addEventListener('click', () => $('ob-camera').click());
  $('ob-choose').addEventListener('click', () => $('ob-library').click());
  $('ob-camera').addEventListener('change', async (e) => { const f = e.target.files[0]; e.target.value = ''; if (f) await queuePhoto(f); });
  $('ob-library').addEventListener('change', async (e) => { const files = Array.from(e.target.files || []); e.target.value = ''; for (const f of files) await queuePhoto(f); });

  // ---- Category options (for assigning each approved tile) ----
  let CAT_OPTS = [];   // [{value:'nouns:9', text:'Nouns — Numbers', section, catId}]
  async function loadCategories() {
    try {
      const r = await fetch('/api/sync?childId=' + encodeURIComponent(slug), { credentials: 'same-origin' });
      if (!r.ok) return;
      const cats = (await r.json()).categories || [];
      const opts = [];
      for (const s of ['people', 'nouns', 'verbs']) {
        const secCats = cats.filter(c => c.section === s);
        opts.push({ value: s + ':', text: 'All ' + s + ' (no category)', section: s, catId: null });
        const tops = secCats.filter(c => c.parentId == null).sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
        for (const t of tops) {
          opts.push({ value: s + ':' + t.id, text: s + ' — ' + t.label, section: s, catId: t.id });
          const subs = secCats.filter(c => c.parentId === t.id).sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
          for (const sub of subs) opts.push({ value: s + ':' + sub.id, text: s + ' — ' + t.label + ' / ' + sub.label, section: s, catId: sub.id });
        }
      }
      CAT_OPTS = opts;
    } catch (_) {}
  }

  // ---- Review queue ----
  const seen = new Map();   // id -> status currently rendered (so we don't clobber edits)
  const cardsEl = $('ob-cards');

  function catSelect() {
    const sel = document.createElement('select');
    for (const o of CAT_OPTS) { const opt = document.createElement('option'); opt.value = o.value; opt.textContent = o.text; sel.appendChild(opt); }
    return sel;
  }
  function buildCard(d) {
    const card = document.createElement('div'); card.className = 'card'; card.dataset.id = d.id;
    const thumb = document.createElement('div'); thumb.className = 'thumb';
    if (d.status === 'ready' && d.image_key) {
      const img = document.createElement('img'); img.src = '/api/media?key=' + encodeURIComponent(d.image_key); thumb.appendChild(img);
    } else if (d.status === 'failed') { thumb.textContent = '⚠️ Could not render'; }
    else { const s = document.createElement('div'); s.className = 'spin'; thumb.appendChild(s); }
    card.appendChild(thumb);

    if (d.status === 'ready') {
      const name = document.createElement('input'); name.type = 'text'; name.value = d.label || ''; name.placeholder = 'Name'; card.appendChild(name);
      const pron = document.createElement('input'); pron.type = 'text'; pron.className = 'pron'; pron.value = d.pronunciation || ''; pron.placeholder = 'Say it as… (optional)'; pron.style.marginTop = '6px'; card.appendChild(pron);
      const cat = catSelect(); cat.style.marginTop = '6px'; card.appendChild(cat);
      const row = document.createElement('div'); row.className = 'row';
      const play = document.createElement('button'); play.className = 'btn ghost tiny'; play.textContent = '🔊'; play.style.flex = '0 0 auto';
      play.addEventListener('click', () => { if (d.sound_key) { const a = $('ob-audio'); a.src = '/api/media?key=' + encodeURIComponent(d.sound_key); a.play().catch(() => {}); } });
      const approve = document.createElement('button'); approve.className = 'btn ok tiny'; approve.textContent = '✓ Approve';
      const reject = document.createElement('button'); reject.className = 'btn no tiny'; reject.textContent = '✕';
      approve.addEventListener('click', async () => {
        const v = cat.value.split(':'); const section = v[0]; const catId = v[1] ? parseInt(v[1], 10) : null;
        if (!name.value.trim()) { name.focus(); return; }
        approve.disabled = true; approve.textContent = '…';
        try {
          const r = await fetch('/api/pending-approve', { method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin',
            body: JSON.stringify({ id: d.id, childId: slug, section, categoryId: catId, label: name.value.trim(), pronunciation: pron.value.trim() }) });
          if (r.ok) { card.remove(); seen.delete(String(d.id)); } else { approve.disabled = false; approve.textContent = '✓ Approve'; }
        } catch (_) { approve.disabled = false; approve.textContent = '✓ Approve'; }
      });
      reject.addEventListener('click', () => rejectDraft(d.id, card));
      row.appendChild(play); row.appendChild(approve); row.appendChild(reject); card.appendChild(row);
    } else {
      const status = document.createElement('div'); status.style.cssText = 'text-align:center;font-size:13px;color:var(--muted);margin-top:8px;';
      status.textContent = d.status === 'failed' ? (d.error || 'Failed') : 'Rendering…';
      card.appendChild(status);
      if (d.status === 'failed') { const reject = document.createElement('button'); reject.className = 'btn no tiny'; reject.style.cssText = 'margin-top:8px;width:100%;'; reject.textContent = 'Remove'; reject.addEventListener('click', () => rejectDraft(d.id, card)); card.appendChild(reject); }
    }
    return card;
  }
  async function rejectDraft(id, card) {
    try { await fetch('/api/pending?childId=' + encodeURIComponent(slug) + '&id=' + id, { method: 'DELETE', credentials: 'same-origin' }); } catch (_) {}
    card.remove(); seen.delete(String(id));
  }

  async function poll() {
    let list;
    try { const r = await fetch('/api/pending?childId=' + encodeURIComponent(slug), { credentials: 'same-origin' }); if (!r.ok) return; list = (await r.json()).pending || []; }
    catch (_) { return; }
    const empty = cardsEl.querySelector('.empty'); if (empty && list.length) empty.remove();
    const ids = new Set(list.map(d => String(d.id)));
    for (const d of list) {
      const key = String(d.id);
      if (!seen.has(key)) { cardsEl.appendChild(buildCard(d)); seen.set(key, d.status); }
      else if (seen.get(key) !== d.status) {
        const old = cardsEl.querySelector('.card[data-id="' + d.id + '"]');
        const fresh = buildCard(d);
        if (old) old.replaceWith(fresh); else cardsEl.appendChild(fresh);
        seen.set(key, d.status);
      }
    }
    // drop cards for drafts that vanished (approved elsewhere)
    for (const key of [...seen.keys()]) { if (!ids.has(key)) { const el = cardsEl.querySelector('.card[data-id="' + key + '"]'); if (el) el.remove(); seen.delete(key); } }
    if (!cardsEl.children.length) cardsEl.innerHTML = '<div class="empty">No photos yet — snap one above to begin.</div>';
  }

  loadCategories();
  poll();
  setInterval(poll, 3000);
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sign in · My World</title>
<meta name="theme-color" content="#ff1493">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  :root { --pink:#ff1493; --pink-deep:#ad1457; --ink:#1f2937; --muted:#6b7280; --line:#fce4ec; --danger:#dc2626; --good:#16a34a; }
  html,body { margin:0; min-height:100%; background:linear-gradient(180deg,#fff7fb,#ffeaf4);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; color:var(--ink); }
  .wrap { min-height:100vh; display:grid; place-items:center; padding:24px; }
  .card { background:#fff; border:1px solid var(--line); border-radius:22px; padding:30px; width:100%; max-width:380px;
    box-shadow:0 18px 50px rgba(255,20,147,.12); }
  .brand { font-family:'Fredoka',ui-rounded,system-ui,sans-serif; font-weight:700; color:var(--pink-deep); font-size:24px; text-align:center; }
  .tag { text-align:center; color:var(--muted); font-size:13px; margin:4px 0 22px; }
  label { display:block; font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin:0 0 6px; }
  input, select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:11px; font:inherit; margin-bottom:14px; }
  input:focus, select:focus { outline:none; border-color:var(--pink); }
  button { width:100%; border:none; cursor:pointer; font:inherit; font-weight:700; font-size:15px; border-radius:999px;
    padding:13px; background:var(--pink); color:#fff; }
  button:hover { background:var(--pink-deep); }
  button:disabled { opacity:.55; cursor:default; }
  .msg { font-size:13px; margin-top:14px; min-height:18px; }
  .msg.err { color:var(--danger); } .msg.ok { color:var(--good); }
  .links { margin-top:18px; text-align:center; font-size:13px; }
  .links a { color:var(--pink-deep); cursor:pointer; font-weight:600; }
  .extra { margin-top:18px; border-top:1px dashed var(--line); padding-top:16px; }
  .extra[hidden] { display:none; }
  details { margin-top:18px; }
  details summary { cursor:pointer; font-size:12px; color:var(--muted); }
  details .hint { font-size:12px; color:var(--muted); margin:8px 0 12px; }
  .row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .cta-band { margin-top:20px; border-top:1px solid var(--line); padding-top:18px; text-align:center; }
  .cta-band p { font-size:13px; color:var(--muted); margin:0 0 12px; }
  .cta-band a.cta { display:inline-block; text-decoration:none; background:#fff; color:var(--pink-deep);
    border:2px solid var(--pink); border-radius:999px; padding:11px 20px; font-weight:700; font-size:14px; }
  .cta-band a.cta:hover { background:var(--pink); color:#fff; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="brand">🌍 My World</div>
    <div class="tag">Sign in to continue</div>

    <!-- Login -->
    <form id="login-form" novalidate>
      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="username" placeholder="you@example.com" required>
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" required>
      <button type="submit" id="login-btn">Log in</button>
    </form>
    <div class="msg" id="msg"></div>
    <div class="links">
      <a id="show-forgot">Forgot password?</a>
    </div>

    <!-- New-parent CTA: walk through the house, build the board in minutes -->
    <div class="cta-band">
      <p>New to My World? Set up your child's board in about five minutes.</p>
      <a class="cta" href="/onboard">📸 Set up your child's board →</a>
    </div>

    <!-- Forgot password -->
    <div class="extra" id="forgot" hidden>
      <label for="forgot-email">Reset — your email</label>
      <input id="forgot-email" type="email" autocomplete="username" placeholder="you@example.com">
      <button id="forgot-btn" type="button">Send reset link</button>
      <div class="msg" id="forgot-msg"></div>
    </div>

    <!-- First-time setup (bootstrap the first admin with the existing token) -->
    <details id="setup">
      <summary>First-time setup</summary>
      <p class="hint">Create the first admin account. Paste your existing admin token (the one the app/admin already use). You only need to do this once.</p>
      <label for="s-token">Admin token</label>
      <input id="s-token" type="password" placeholder="ADMIN_TOKEN">
      <label for="s-email">Email</label>
      <input id="s-email" type="email" placeholder="you@example.com">
      <label for="s-password">Password (min 8 chars)</label>
      <input id="s-password" type="password" placeholder="••••••••">
      <div class="row2">
        <div>
          <label for="s-role">Role</label>
          <select id="s-role"><option value="admin">admin</option><option value="parent">parent</option><option value="therapist">therapist</option></select>
        </div>
        <div>
          <label for="s-slug">Child slug</label>
          <input id="s-slug" placeholder="fletcherpeterson" value="fletcherpeterson">
        </div>
      </div>
      <button id="s-btn" type="button">Create account</button>
      <div class="msg" id="s-msg"></div>
    </details>
  </div>
</div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const params = new URLSearchParams(location.search);
  const rawNext = params.get('next') || '';
  // Only honor same-origin path redirects.
  const next = /^\/[^/]/.test(rawNext) ? rawNext : '';

  function destFor(user) {
    if (next) return next;
    const slug = user.slug || 'fletcherpeterson';
    if (user.role === 'admin') return '/admin';
    if (user.role === 'therapist') return '/therapist/' + encodeURIComponent(slug);
    if (user.role === 'parent') return '/parent/' + encodeURIComponent(slug);
    return '/u/' + encodeURIComponent(slug);
  }

  async function postJSON(url, bodyObj, headers) {
    const r = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json', ...(headers || {}) }, body: JSON.stringify(bodyObj) });
    const data = await r.json().catch(() => ({}));
    return { ok: r.ok, status: r.status, data };
  }

  // ---- Login ----
  $('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const msg = $('msg'); msg.className = 'msg'; msg.textContent = '';
    const btn = $('login-btn'); btn.disabled = true; const prev = btn.textContent; btn.textContent = 'Signing in…';
    const { ok, data } = await postJSON('/api/auth/login', { email: $('email').value.trim(), password: $('password').value });
    if (ok && data.ok) {
      msg.className = 'msg ok'; msg.textContent = 'Welcome! Redirecting…';
      location.assign(destFor(data.user));
    } else {
      msg.className = 'msg err'; msg.textContent = data.error || 'Login failed.';
      btn.disabled = false; btn.textContent = prev;
    }
  });

  // ---- Forgot password ----
  $('show-forgot').addEventListener('click', () => { $('forgot').hidden = !$('forgot').hidden; });
  $('forgot-btn').addEventListener('click', async () => {
    const m = $('forgot-msg'); m.className = 'msg'; m.textContent = '';
    const { ok, data } = await postJSON('/api/auth/reset-request', { email: $('forgot-email').value.trim() });
    if (ok) {
      m.className = 'msg ok';
      m.textContent = data.resetUrl ? 'Reset link (admin): ' + location.origin + data.resetUrl : 'If that email has an account, a reset link is on its way.';
    } else {
      m.className = 'msg err'; m.textContent = data.error || 'Could not start reset.';
    }
  });

  // ---- First-time setup ----
  $('s-btn').addEventListener('click', async () => {
    const m = $('s-msg'); m.className = 'msg'; m.textContent = '';
    const token = $('s-token').value.trim();
    if (!token) { m.className = 'msg err'; m.textContent = 'Admin token required.'; return; }
    const { ok, data } = await postJSON('/api/auth/register', {
      email: $('s-email').value.trim(), password: $('s-password').value,
      role: $('s-role').value, slug: $('s-slug').value.trim(),
    }, { Authorization: 'Bearer ' + token });
    if (ok && data.ok) {
      m.className = 'msg ok'; m.textContent = 'Account created — you can log in above now.';
      $('email').value = data.user.email;
    } else {
      m.className = 'msg err'; m.textContent = data.error || 'Could not create account.';
    }
  });
})();
</script>
</body>
</html>

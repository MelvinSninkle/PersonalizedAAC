<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portrait Lab — onboarding people generation</title>
<style>
  * { box-sizing: border-box; }
  :root { --pink:#ff1493; --pink-deep:#ad1457; --ink:#1f2937; --muted:#6b7280; --line:#fce4ec; --bg:#fdf2f8; }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  header { background:#fff; border-bottom:1px solid var(--line); padding:14px 20px; }
  header h1 { margin:0; font-size:18px; color:var(--pink-deep); }
  header p { margin:4px 0 0; font-size:13px; color:var(--muted); }
  .wrap { max-width:1100px; margin:0 auto; padding:20px; display:grid; grid-template-columns:360px 1fr; gap:20px; }
  .card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px; }
  label { display:block; font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin:14px 0 6px; }
  label:first-child { margin-top:0; }
  select, input[type=text], input[type=number], textarea { width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:10px; font:inherit; }
  textarea { min-height:70px; resize:vertical; }
  .btn { border:none; cursor:pointer; font:inherit; font-weight:700; border-radius:999px; padding:12px 18px; background:var(--pink); color:#fff; font-size:15px; }
  .btn:hover { background:var(--pink-deep); } .btn:disabled { opacity:.5; cursor:default; }
  .btn.ghost { background:#fff0f6; color:var(--pink-deep); }
  .thumb { width:100%; aspect-ratio:1; border:2px solid var(--line); border-radius:12px; background:#fff7fb center/contain no-repeat; display:grid; place-items:center; color:var(--muted); font-size:13px; overflow:hidden; }
  .thumb img { width:100%; height:100%; object-fit:contain; }
  .pair { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .pair .cap { font-size:12px; color:var(--muted); text-align:center; margin-top:6px; }
  .msg { font-size:13px; color:var(--muted); margin-top:10px; min-height:18px; }
  .msg.err { color:#dc2626; }
  pre { white-space:pre-wrap; font-size:12px; background:#fff7fb; border:1px solid var(--line); border-radius:10px; padding:12px; color:#374151; max-height:300px; overflow:auto; }
  .pill { display:inline-block; font-size:12px; font-weight:700; padding:2px 10px; border-radius:999px; }
  .pill.ok { background:#dcfce7; color:#166534; } .pill.no { background:#fee2e2; color:#991b1b; }
  @media (max-width:820px){ .wrap{ grid-template-columns:1fr; } }
</style>
</head>
<body>
<header>
  <h1>🎨 Portrait Lab</h1>
  <p>Bench for the onboarding people-portrait generation — same prompt &amp; images a parent gets. Admin only.</p>
  <a href="/admin/" style="display:inline-block;margin-top:6px;color:var(--pink);font-weight:700;font-size:14px;text-decoration:none;">← Lab home</a>
</header>
<div class="wrap">
  <!-- Controls -->
  <div class="card">
    <label>Child / person photo</label>
    <input type="file" id="photo" accept="image/*">
    <div class="thumb" id="photo-thumb" style="margin-top:8px;">Pick a photo</div>

    <label>Style guide</label>
    <select id="style-select"><option value="">Loading…</option></select>
    <label style="margin-top:8px;">…or paste a style guide id (e.g. a child's uploaded style from the usage log)</label>
    <input type="text" id="style-id" placeholder="e.g. 42" inputmode="numeric">
    <div class="thumb" id="style-thumb" style="margin-top:8px;height:140px;aspect-ratio:auto;">Style preview</div>

    <label>Subject age</label>
    <!-- Production derives this from the relationship (mother → adult) or the
         capture UI's kid/grown-up toggle; the prompt adapts the style's own
         adult vs child treatment (the saucer-eyed-Dad fix). -->
    <select id="age-group">
      <option value="">Auto — draw at apparent age</option>
      <option value="adult">Adult — the style's grown-up treatment</option>
      <option value="child">Child — the style's kid treatment</option>
    </select>

    <label>Correction / guidance (optional)</label>
    <textarea id="guidance" placeholder="e.g. add white to the eyes, lighten the hair, flatter shading"></textarea>

    <label>Attempt (variance nudge)</label>
    <input type="number" id="attempt" value="0" min="0" max="5">

    <label>Keystone model (OpenAI)</label>
    <select id="model-select"><option value="">Loading models…</option></select>
    <div style="display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap;">
      <button class="btn ghost" id="save-model" style="font-size:13px;padding:8px 14px;">Save as production model</button>
      <span id="model-msg" style="font-size:12px;color:var(--muted);"></span>
    </div>

    <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;">
      <button class="btn" id="gen">Generate</button>
      <button class="btn ghost" id="again">Try again (+1 attempt)</button>
    </div>
    <div class="msg" id="msg"></div>
  </div>

  <!-- Output -->
  <div class="card">
    <div class="pair">
      <div><div class="thumb" id="style-out">Style ref</div><div class="cap">IMAGE 1 · style reference</div></div>
      <div><div class="thumb" id="result">Result</div><div class="cap" id="result-cap">Result</div></div>
    </div>
    <pre id="error" style="display:none;white-space:pre-wrap;font-size:12px;background:#fef2f2;border:1px solid #fecaca;color:#991b1b;border-radius:10px;padding:12px;margin-top:14px;max-height:340px;overflow:auto;"></pre>
    <label style="margin-top:16px;">Prompt sent to the model</label>
    <pre id="prompt">—</pre>
  </div>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  let photoB64 = '';

  async function api(path, body) {
    const r = await fetch(path, { method: 'POST', credentials: 'same-origin', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    let d = null; try { d = await r.json(); } catch (_) {}
    if (!r.ok) throw new Error((d && [d.error, d.detail].filter(Boolean).join(' — ')) || ('HTTP ' + r.status));
    return d;
  }
  function msg(t, err) { const m = $('msg'); m.textContent = t || ''; m.className = 'msg' + (err ? ' err' : ''); }

  // Downscale a chosen photo to base64 (jpeg) for the request body.
  $('photo').addEventListener('change', async (e) => {
    const f = e.target.files[0]; if (!f) return;
    try {
      const bmp = await createImageBitmap(f);
      const scale = Math.min(1, 1024 / Math.max(bmp.width, bmp.height));
      const w = Math.round(bmp.width * scale), h = Math.round(bmp.height * scale);
      const c = document.createElement('canvas'); c.width = w; c.height = h;
      c.getContext('2d').drawImage(bmp, 0, 0, w, h); if (bmp.close) bmp.close();
      const dataUrl = c.toDataURL('image/jpeg', 0.9);
      photoB64 = dataUrl.replace(/^data:[^;]+;base64,/, '');
      $('photo-thumb').innerHTML = '<img src="' + dataUrl + '" alt="">';
    } catch (err) { msg('Could not read photo: ' + err.message, true); }
  });

  // Load the public style guides into the dropdown.
  (async () => {
    try {
      const r = await fetch('/api/admin/style-guides', { credentials: 'same-origin' }).then(x => x.json());
      const guides = (r && r.styleGuides) || [];
      $('style-select').innerHTML = '<option value="">— none (no-style fallback) —</option>' +
        guides.map(g => '<option value="' + g.id + '">' + (g.label || ('#' + g.id)) + (g.active ? '' : ' (inactive)') + '</option>').join('');
    } catch (_) { $('style-select').innerHTML = '<option value="">(could not load styles)</option>'; }
  })();

  function currentStyleId() {
    const manual = ($('style-id').value || '').trim();
    if (manual) return manual;
    return $('style-select').value || '';
  }
  function showStylePreview() {
    const id = currentStyleId();
    const t = $('style-thumb');
    if (!id) { t.innerHTML = 'No style (fallback)'; return; }
    t.innerHTML = '<img src="/api/onboarding/styles?image=' + encodeURIComponent(id) + '" alt="">';
  }
  $('style-select').addEventListener('change', () => { $('style-id').value = ''; showStylePreview(); });
  $('style-id').addEventListener('input', showStylePreview);

  // Keystone model selector — options come from OpenAI's real model list for this
  // account, so they're never a guess. Saving sets the live production model.
  (async () => {
    try {
      const d = await fetch('/api/admin/keystone-model', { credentials: 'same-origin' }).then(r => r.json());
      const opts = [...new Set([...(d.available || []), d.current, d.fallback].filter(Boolean))];
      if (!opts.length) opts.push('gpt-image-1');
      $('model-select').innerHTML = opts.map(m => '<option value="' + m + '"' + (m === d.current ? ' selected' : '') + '>' + m + (m === d.current ? ' (current)' : '') + '</option>').join('');
      $('model-msg').textContent = (d.available && d.available.length) ? '' : 'Could not list models (key/funding?) — showing known ids.';
    } catch (_) { $('model-select').innerHTML = '<option value="gpt-image-1">gpt-image-1</option>'; }
  })();
  $('save-model').addEventListener('click', async () => {
    const m = $('model-select').value; if (!m) return;
    $('save-model').disabled = true; $('model-msg').textContent = 'Saving…';
    try {
      const r = await fetch('/api/admin/keystone-model', { method: 'PUT', credentials: 'same-origin', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ model: m }) });
      const d = await r.json(); if (!r.ok) throw new Error(d.error || ('HTTP ' + r.status));
      $('model-msg').textContent = 'Saved — production keystones now use ' + m + '.';
    } catch (err) { $('model-msg').textContent = 'Could not save: ' + (err.message || err); }
    finally { $('save-model').disabled = false; }
  });

  async function generate() {
    if (!photoB64) { msg('Pick a photo first.', true); return; }
    const styleGuideId = currentStyleId();
    const guidance = ($('guidance').value || '').trim();
    const attempt = Number($('attempt').value) || 0;
    $('gen').disabled = true; $('again').disabled = true; msg('Generating… ~20–40s');
    $('error').style.display = 'none'; $('error').textContent = '';
    $('result').innerHTML = '<div style="font-size:13px;color:#9ca3af;">Working…</div>';
    // mirror the style ref into the output pane
    $('style-out').innerHTML = styleGuideId ? '<img src="/api/onboarding/styles?image=' + encodeURIComponent(styleGuideId) + '" alt="">' : 'No style';
    try {
      const d = await api('/api/admin/portrait-lab', { photoB64, photoType: 'image/jpeg', styleGuideId, guidance, attempt,
        ageGroup: $('age-group').value || undefined, model: $('model-select').value || undefined });
      $('result').innerHTML = '<img src="data:image/png;base64,' + d.b64 + '" alt="">';
      $('prompt').textContent = d.prompt || '—';
      const pill = d.styleImageAttached ? '<span class="pill ok">style image ATTACHED</span>' : '<span class="pill no">no style image</span>';
      $('result-cap').innerHTML = 'Result · ' + pill + (d.engine ? ' · ' + d.engine : '') + (d.styleLabel ? ' · ' + d.styleLabel + ' (#' + d.styleGuideId + ')' : '');
      msg('Done.');
    } catch (err) {
      $('result').innerHTML = '<div style="font-size:13px;color:#dc2626;">Failed</div>';
      msg('Generation failed — see full error below.', true);
      $('error').textContent = (err.message || String(err));
      $('error').style.display = 'block';
    } finally { $('gen').disabled = false; $('again').disabled = false; }
  }
  $('gen').addEventListener('click', generate);
  $('again').addEventListener('click', () => { $('attempt').value = (Number($('attempt').value) || 0) + 1; generate(); });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Default board — admin</title>
<style>
  :root { --pink:#ad1457; --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,system-ui,Segoe UI,Roboto,sans-serif; color:var(--ink); background:#faf7f9; }
  header {
    position:sticky; top:0; z-index:10; background:#fff; border-bottom:1px solid var(--line);
    display:flex; flex-wrap:wrap; align-items:center; gap:10px 14px; padding:12px 18px;
  }
  header h1 { font-size:18px; margin:0; margin-right:6px; }
  .stat { font-size:13px; color:var(--muted); }
  .stat b { color:var(--ink); }
  .stat .warn { color:#b45309; }
  .spacer { flex:1; }
  select, input[type=search], button {
    font:inherit; padding:7px 10px; border:1px solid var(--line); border-radius:9px; background:#fff; color:var(--ink);
  }
  button { cursor:pointer; }
  button.primary { background:var(--pink); color:#fff; border-color:var(--pink); font-weight:600; }
  a.back { color:var(--pink); text-decoration:none; font-size:13px; }

  main { padding:16px 18px 60px; }
  .group-title {
    margin:22px 0 10px; font-size:14px; font-weight:700; color:var(--pink);
    text-transform:uppercase; letter-spacing:.04em; border-bottom:1px solid var(--line); padding-bottom:6px;
  }
  .grid {
    display:grid; grid-template-columns:repeat(auto-fill, minmax(118px, 1fr)); gap:12px;
  }
  .tile {
    position:relative; aspect-ratio:1/1; border-radius:14px; overflow:hidden;
    display:flex; align-items:center; justify-content:center; text-align:center;
    background:#fff; border:1px solid var(--line);
  }
  .tile img { width:100%; height:100%; object-fit:cover; display:block; }
  /* Personalized → empty tile with just the word. */
  .tile.personal { border:2px dashed #cbd5e1; background:#f8fafc; }
  .tile.personal .word { font-size:15px; font-weight:700; color:#334155; padding:6px; }
  .tile.personal .who { position:absolute; bottom:5px; left:0; right:0; font-size:9px; color:#94a3b8; text-transform:uppercase; letter-spacing:.05em; }
  /* Default-able but no image yet → flag it. */
  .tile.missing { border:2px dashed #f59e0b; background:#fffbeb; }
  .tile.missing .word { font-size:15px; font-weight:700; color:#92400e; padding:6px; }
  .tile.missing .who { position:absolute; bottom:5px; left:0; right:0; font-size:9px; color:#b45309; text-transform:uppercase; letter-spacing:.05em; }
  .tile .cap { position:absolute; bottom:0; left:0; right:0; font-size:10px; color:#64748b; background:rgba(255,255,255,.85); padding:2px 4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tile .badge { position:absolute; top:5px; right:5px; font-size:14px; }
  .empty { color:var(--muted); padding:40px; text-align:center; }
  .legend { display:flex; gap:16px; flex-wrap:wrap; font-size:12px; color:var(--muted); margin-top:4px; }
  .legend span { display:inline-flex; align-items:center; gap:6px; }
  .swatch { width:14px; height:14px; border-radius:4px; display:inline-block; }
</style>
</head>
<body>
<header>
  <h1>🖼️ Default board</h1>
  <span class="stat" id="stat">Loading…</span>
  <div class="spacer"></div>
  <input type="search" id="q" placeholder="Search word…" style="width:150px;">
  <select id="filter">
    <option value="all">All tiles</option>
    <option value="defaultable">Default-able only</option>
    <option value="missing">Missing default</option>
    <option value="personal">Personalized only</option>
  </select>
  <button id="refresh">↻ Refresh</button>
  <a class="back" href="/admin/taxonomy.html">← Taxonomy</a>
</header>
<main>
  <div class="legend">
    <span><i class="swatch" style="background:#fff;border:1px solid #e5e7eb;"></i> default image</span>
    <span><i class="swatch" style="background:#fffbeb;border:2px dashed #f59e0b;"></i> default-able, no image yet</span>
    <span><i class="swatch" style="background:#f8fafc;border:2px dashed #cbd5e1;"></i> personalized (per-child)</span>
  </div>
  <div id="board"><div class="empty">Loading the default board…</div></div>
</main>

<script>
  // Same admin auth as the other tools: session cookie (preferred) or the legacy
  // bearer token in localStorage. Private images load via /api/media on the cookie.
  const token = localStorage.getItem('aacToken') || '';
  async function api(path) {
    const headers = {};
    if (token) headers.Authorization = 'Bearer ' + token;
    const r = await fetch(path, { headers, credentials: 'same-origin' });
    if (r.status === 401 || r.status === 403) throw new Error('Sign in as an admin first (open /login), then return here.');
    if (!r.ok) throw new Error(r.status + ': ' + (await r.text()).slice(0, 160));
    return r.json();
  }

  let TILES = [];
  const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

  function passesFilter(t, mode) {
    if (mode === 'defaultable') return t.defaultable;
    if (mode === 'missing') return t.defaultable && !t.imageKey;
    if (mode === 'personal') return !t.defaultable;
    return true;
  }

  function tileHTML(t) {
    const cap = esc(t.label);
    if (t.defaultable && t.imageKey) {
      return `<div class="tile" title="${cap} — default image">
        <img loading="lazy" src="/api/media?key=${encodeURIComponent(t.imageKey)}" alt="${cap}">
      </div>`;
    }
    if (t.defaultable && !t.imageKey) {
      return `<div class="tile missing" title="${cap} — default-able but no default image yet">
        <span class="word">${cap}</span><span class="who">no default</span><span class="badge">⚠️</span>
      </div>`;
    }
    return `<div class="tile personal" title="${cap} — personalized per child">
      <span class="word">${cap}</span><span class="who">personalized</span>
    </div>`;
  }

  function render() {
    const mode = document.getElementById('filter').value;
    const q = document.getElementById('q').value.trim().toLowerCase();
    const board = document.getElementById('board');
    const shown = TILES.filter((t) => passesFilter(t, mode) && (!q || String(t.label).toLowerCase().includes(q)));
    if (!shown.length) { board.innerHTML = '<div class="empty">No tiles match.</div>'; return; }

    // Group by column, then category, preserving the server's order.
    const groups = new Map();
    for (const t of shown) {
      const key = (t.column || 'Other') + (t.category ? ' › ' + t.category : '');
      if (!groups.has(key)) groups.set(key, []);
      groups.get(key).push(t);
    }
    let html = '';
    for (const [key, list] of groups) {
      html += `<div class="group-title">${esc(key)} <span style="font-weight:400;color:#94a3b8;">(${list.length})</span></div>`;
      html += '<div class="grid">' + list.map(tileHTML).join('') + '</div>';
    }
    board.innerHTML = html;
  }

  async function load() {
    const board = document.getElementById('board');
    board.innerHTML = '<div class="empty">Loading the default board…</div>';
    try {
      const d = await api('/api/admin/lab?action=defaults-view');
      TILES = d.tiles || [];
      document.getElementById('stat').innerHTML =
        `<b>${d.total}</b> tiles · <b>${d.withImage}</b> default images · ` +
        `<span class="warn"><b>${d.missing}</b> missing</span> · <b>${d.personalized}</b> personalized`;
      render();
    } catch (e) {
      board.innerHTML = '<div class="empty">' + esc(e.message || e) + '</div>';
      document.getElementById('stat').textContent = 'Error';
    }
  }

  document.getElementById('filter').addEventListener('change', render);
  document.getElementById('q').addEventListener('input', render);
  document.getElementById('refresh').addEventListener('click', load);
  load();
</script>
</body>
</html>

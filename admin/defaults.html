<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Default board — admin</title>
<style>
  :root { --pink:#ad1457; --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,system-ui,Segoe UI,Roboto,sans-serif; color:var(--ink); background:#faf7f9; }
  header {
    position:sticky; top:0; z-index:10; background:#fff; border-bottom:1px solid var(--line);
    display:flex; flex-wrap:wrap; align-items:center; gap:10px 14px; padding:12px 18px;
  }
  header h1 { font-size:18px; margin:0; margin-right:6px; }
  .stat { font-size:13px; color:var(--muted); }
  .stat b { color:var(--ink); }
  .stat .warn { color:#b45309; }
  .spacer { flex:1; }
  select, input[type=search], button {
    font:inherit; padding:7px 10px; border:1px solid var(--line); border-radius:9px; background:#fff; color:var(--ink);
  }
  button { cursor:pointer; }
  button:disabled { opacity:.5; cursor:default; }
  button.primary { background:var(--pink); color:#fff; border-color:var(--pink); font-weight:600; }
  button.danger { background:#fff; color:#b91c1c; border-color:#fecaca; }
  a.back { color:var(--pink); text-decoration:none; font-size:13px; }
  .chip-warn {
    font-size:12px; background:#fffbeb; color:#92400e; border:1px solid #fcd34d;
    border-radius:999px; padding:4px 10px;
  }
  #progress { font-size:12px; color:var(--pink); font-weight:600; min-height:1em; width:100%; }

  main { padding:16px 18px 60px; }
  .legend { display:flex; gap:16px; flex-wrap:wrap; font-size:12px; color:var(--muted); margin-top:4px; }
  .legend span { display:inline-flex; align-items:center; gap:6px; }
  .swatch { width:14px; height:14px; border-radius:4px; display:inline-block; }
  .empty { color:var(--muted); padding:40px; text-align:center; }

  /* ── Board-like layout: column → category → subcategory ───────────── */
  .col-section { margin:28px 0 12px; }
  .col-head {
    display:flex; align-items:baseline; gap:12px; flex-wrap:wrap;
    border-bottom:3px solid var(--pink); padding-bottom:8px; margin-bottom:14px;
  }
  .col-head h2 { margin:0; font-size:24px; color:var(--pink); text-transform:capitalize; letter-spacing:.02em; }
  .col-head .counts { font-size:13px; color:var(--muted); }
  .col-head .counts b { color:var(--ink); }
  .cat-group { margin:18px 0 8px; }
  .cat-title {
    font-size:16px; font-weight:800; color:#4c1d95; margin:14px 0 8px;
    text-transform:uppercase; letter-spacing:.05em;
  }
  .sub-group {
    margin:14px 0 10px 26px; padding-left:16px; border-left:3px solid #ddd6fe;
  }
  .sub-title { font-size:14px; font-weight:700; color:#6d28d9; margin:8px 0 8px; }
  .grid {
    display:grid; grid-template-columns:repeat(auto-fill, minmax(190px, 1fr)); gap:16px;
  }

  /* Cards: LARGE image with the word in big clear text under it (spell-check view). */
  .card {
    position:relative; border-radius:16px; overflow:hidden; background:#fff;
    border:1px solid var(--line); display:flex; flex-direction:column;
  }
  .card .imgwrap {
    position:relative; aspect-ratio:1/1; background:#f8fafc;
    display:flex; align-items:center; justify-content:center; text-align:center;
  }
  .card .imgwrap img { width:100%; height:100%; object-fit:cover; display:block; }
  .card .word {
    padding:8px 8px 10px; font-size:20px; line-height:1.15; font-weight:800;
    text-align:center; color:var(--ink); word-break:break-word;
  }
  .card.chip { border-color:#c4b5fd; background:#f5f3ff; }
  .card.chip .word { color:#4c1d95; font-size:18px; }
  .card.chip .word::before { content:'📁 '; font-weight:400; }
  /* Missing image → amber. Failed → red. Personalized (generic mode) → gray dashed. */
  .card.missing { border:2px dashed #f59e0b; }
  .card.missing .imgwrap { background:#fffbeb; }
  .card.failed { border:2px solid #ef4444; }
  .card.failed .imgwrap { background:#fef2f2; }
  .card.personal { border:2px dashed #cbd5e1; }
  .card.personal .imgwrap { background:#f8fafc; }
  .card .placeholder { font-size:15px; font-weight:700; color:#94a3b8; padding:10px; }
  .card.missing .placeholder { color:#92400e; }
  .card.failed .placeholder { color:#b91c1c; }
  .badge {
    position:absolute; top:8px; left:8px; font-size:11px; font-weight:800;
    border-radius:999px; padding:3px 9px; text-transform:uppercase; letter-spacing:.04em;
  }
  .badge.missing { background:#fef3c7; color:#92400e; border:1px solid #f59e0b; }
  .badge.failed { background:#fee2e2; color:#b91c1c; border:1px solid #ef4444; }
  .regen {
    position:absolute; bottom:8px; right:8px; padding:4px 8px; font-size:14px;
    border-radius:9px; background:rgba(255,255,255,.92); border:1px solid var(--line);
  }
  .card.busy .regen { pointer-events:none; }
  .card.busy .imgwrap::after {
    content:''; position:absolute; inset:0; background:rgba(255,255,255,.6);
  }
  .card.busy .imgwrap::before {
    content:''; position:absolute; z-index:1; width:34px; height:34px; top:calc(50% - 17px); left:calc(50% - 17px);
    border:4px solid #f3c1d8; border-top-color:var(--pink); border-radius:50%;
    animation:spin .8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<header>
  <h1>🖼️ Default board</h1>
  <select id="style-picker" title="Which style's default set to review">
    <option value="">Generic (unstyled)</option>
  </select>
  <span class="chip-warn" id="ref-warn" hidden>⚠️ upload 👤/🧸 refs on the Lab style card for best results</span>
  <span class="stat" id="stat">Loading…</span>
  <div class="spacer"></div>
  <input type="search" id="q" placeholder="Search word…" style="width:150px;">
  <select id="filter">
    <option value="all">All</option>
    <option value="missing">Missing</option>
    <option value="failed">Failed</option>
    <option value="defaultable">Default-able only</option>
  </select>
  <button id="refresh">↻ Refresh</button>
  <button id="push-defaults" title="Copy the reference board's (Fletcher's) tile art AND folder icons into the shared defaults every new board inherits. Only missing entries are copied — safe to re-run.">⬆️ Push from reference</button>
  <button id="gen-tiles" class="primary" hidden title="Generate style-matched art for every tile that doesn't have one yet.">🎨 Generate missing tiles</button>
  <button id="gen-chips" class="primary" hidden title="Generate style-matched folder icons for every category/subcategory chip that doesn't have one yet.">🎨 Generate missing chips</button>
  <button id="regen-all" class="danger" hidden title="Re-render EVERY tile and chip for this style, replacing existing art.">♻️ Regenerate ALL</button>
  <a class="back" href="/admin/taxonomy.html">← Taxonomy</a>
  <div id="progress"></div>
</header>
<main>
  <div class="legend">
    <span><i class="swatch" style="background:#fff;border:1px solid #e5e7eb;"></i> has image</span>
    <span><i class="swatch" style="background:#fffbeb;border:2px dashed #f59e0b;"></i> missing</span>
    <span><i class="swatch" style="background:#fef2f2;border:2px solid #ef4444;"></i> failed (hover for error)</span>
    <span><i class="swatch" style="background:#f8fafc;border:2px dashed #cbd5e1;"></i> personalized (per-child, generic mode)</span>
    <span><i class="swatch" style="background:#f5f3ff;border:1px solid #c4b5fd;"></i> folder chip</span>
  </div>
  <div id="board"><div class="empty">Loading the default board…</div></div>
</main>

<script>
  // Same admin auth as the other tools: session cookie (preferred) or the legacy
  // bearer token in localStorage. Private images load via /api/media on the cookie.
  const token = localStorage.getItem('aacToken') || '';
  async function api(path) {
    const headers = {};
    if (token) headers.Authorization = 'Bearer ' + token;
    const r = await fetch(path, { headers, credentials: 'same-origin' });
    if (r.status === 401 || r.status === 403) throw new Error('Sign in as an admin first (open /login), then return here.');
    if (!r.ok) throw new Error(r.status + ': ' + (await r.text()).slice(0, 160));
    return r.json();
  }
  async function apiPost(path, body) {
    const headers = {};
    if (token) headers.Authorization = 'Bearer ' + token;
    const opts = { method: 'POST', headers, credentials: 'same-origin' };
    if (body !== undefined) { headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
    const r = await fetch(path, opts);
    if (r.status === 401 || r.status === 403) throw new Error('Sign in as an admin first (open /login), then return here.');
    if (!r.ok) throw new Error(r.status + ': ' + (await r.text()).slice(0, 160));
    return r.json();
  }

  const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
  const norm = (s) => String(s == null ? '' : s).trim().toLowerCase();
  const mediaSrc = (key) => '/api/media?key=' + encodeURIComponent(key);

  // Board column order — same as the kid app renders them.
  const COLUMN_ORDER = ['needs', 'people', 'nouns', 'verbs'];

  let MODE = 'generic';          // 'generic' | 'style'
  let STYLES = [];               // from /api/admin/style-guides
  let STYLE_INFO = null;         // {id,label,personRefKey,stuffRefKey} in style mode
  let TILES = [];                // unified: {id,label,column,category,subcategory,defaultable,imageKey,status,error}
  let CHIPS = [];                // unified: {section,label,parent,imageKey,status,error} (parent=null in generic mode)
  let BUSY = false;              // a bulk loop is running

  function styleGuideId() { return parseInt(document.getElementById('style-picker').value, 10) || 0; }

  // ── Tile / chip state ─────────────────────────────────────────────────
  function tileState(t) {
    if (t.status === 'failed') return 'failed';
    if (t.imageKey) return 'done';
    // Style mode covers person-y tiles too (rendered with the style's person
    // reference), so everything without art counts as missing there.
    if (MODE === 'style') return 'missing';
    return t.defaultable ? 'missing' : 'personal';
  }
  function chipState(c) {
    if (c.status === 'failed') return 'failed';
    return c.imageKey ? 'done' : 'missing';
  }
  function tileVisible(t, mode, q) {
    if (q && !norm(t.label).includes(q)) return false;
    const st = tileState(t);
    if (mode === 'missing') return st === 'missing';
    if (mode === 'failed') return st === 'failed';
    if (mode === 'defaultable') return !!t.defaultable;
    return true;
  }
  function chipVisible(c, mode, q) {
    if (mode === 'defaultable') return false;
    if (q && !norm(c.label).includes(q)) return false;
    const st = chipState(c);
    if (mode === 'missing') return st === 'missing';
    if (mode === 'failed') return st === 'failed';
    return true;
  }

  // Chip lookup. Style mode has exact {section,label,parent}; generic folders
  // carry no parent, so fall back to section+label.
  function chipMaps() {
    const full = new Map(), byLabel = new Map();
    for (const c of CHIPS) {
      full.set(c.section + '|' + norm(c.label) + '|' + norm(c.parent), c);
      const lk = c.section + '|' + norm(c.label);
      if (!byLabel.has(lk)) byLabel.set(lk, c);
    }
    return { full, byLabel };
  }
  function findChip(maps, section, label, parent) {
    return maps.full.get(section + '|' + norm(label) + '|' + norm(parent)) ||
           maps.byLabel.get(section + '|' + norm(label)) || null;
  }

  // ── Card HTML (large image + big word under it, for spell-checking) ──
  function badgeHTML(state, error) {
    if (state === 'missing') return '<span class="badge missing">missing</span>';
    if (state === 'failed') return '<span class="badge failed" title="' + esc(error || 'generation failed') + '">failed</span>';
    return '';
  }
  function regenBtnHTML(data) {
    if (MODE !== 'style') return '';
    return '<button class="regen" title="Regenerate this image in the selected style" ' + data + '>🎨</button>';
  }
  function tileCardHTML(t) {
    const state = tileState(t);
    const cls = state === 'done' ? '' : ' ' + state;
    const title = state === 'failed' ? esc(t.error || 'generation failed') : esc(t.label);
    const img = t.imageKey
      ? '<img loading="lazy" src="' + mediaSrc(t.imageKey) + '" alt="' + esc(t.label) + '">'
      : '<span class="placeholder">' + (state === 'personal' ? 'personalized per child' : 'no image yet') + '</span>';
    return '<div class="card' + cls + '" data-card="t:' + esc(t.id) + '" title="' + title + '">' +
      '<div class="imgwrap">' + img + badgeHTML(state, t.error) +
      regenBtnHTML('data-kind="tile" data-id="' + esc(t.id) + '"') + '</div>' +
      '<div class="word">' + esc(t.label) + '</div></div>';
  }
  function chipCardHTML(c) {
    const state = chipState(c);
    const cls = state === 'done' ? '' : ' ' + state;
    const title = state === 'failed' ? esc(c.error || 'generation failed') : esc(c.section + ' › ' + c.label);
    const img = c.imageKey
      ? '<img loading="lazy" src="' + mediaSrc(c.imageKey) + '" alt="' + esc(c.label) + '">'
      : '<span class="placeholder">no icon yet</span>';
    const data = 'data-kind="chip" data-sec="' + esc(c.section) + '" data-lbl="' + esc(c.label) + '" data-par="' + esc(c.parent || '') + '"';
    return '<div class="card chip' + cls + '" data-card="c:' + esc(c.section + '|' + norm(c.label) + '|' + norm(c.parent)) + '" title="' + title + '">' +
      '<div class="imgwrap">' + img + badgeHTML(state, c.error) + regenBtnHTML(data) + '</div>' +
      '<div class="word">' + esc(c.label) + '</div></div>';
  }

  // ── Render: column sections → category groups → subcategory sub-groups ─
  function render() {
    const mode = document.getElementById('filter').value;
    const q = norm(document.getElementById('q').value);
    const board = document.getElementById('board');
    const maps = chipMaps();

    // Group tiles by column → category → subcategory, preserving server order.
    const cols = new Map();
    for (const t of TILES) {
      const colKey = norm(t.column) || 'other';
      if (!cols.has(colKey)) cols.set(colKey, new Map());
      const cats = cols.get(colKey);
      const cat = String(t.category || '').trim();
      if (!cats.has(cat)) cats.set(cat, { direct: [], subs: new Map() });
      const g = cats.get(cat);
      const sub = String(t.subcategory || '').trim();
      if (!sub) g.direct.push(t);
      else {
        if (!g.subs.has(sub)) g.subs.set(sub, []);
        g.subs.get(sub).push(t);
      }
    }

    const order = COLUMN_ORDER.concat([...cols.keys()].filter((c) => !COLUMN_ORDER.includes(c)).sort());
    let html = '';
    for (const colKey of order) {
      const cats = cols.get(colKey);
      if (!cats) continue;
      let colHTML = '';
      let colMissing = 0, colFailed = 0, colTotal = 0;
      for (const [cat, g] of cats) {
        const allCatTiles = g.direct.concat(...g.subs.values());
        colTotal += allCatTiles.length;
        for (const t of allCatTiles) {
          const st = tileState(t);
          if (st === 'missing') colMissing++;
          if (st === 'failed') colFailed++;
        }
        // Category chip card first, then the category's direct tiles.
        const catChip = cat ? findChip(maps, colKey, cat, '') : null;
        const showCatChip = catChip && chipVisible(catChip, mode, q);
        const direct = g.direct.filter((t) => tileVisible(t, mode, q));
        let catCards = (showCatChip ? chipCardHTML(catChip) : '') + direct.map(tileCardHTML).join('');
        let catHTML = catCards ? '<div class="grid">' + catCards + '</div>' : '';
        // Then each subcategory as an indented sub-group: its chip + its tiles.
        for (const [sub, list] of g.subs) {
          const subChip = findChip(maps, colKey, sub, cat);
          const showSubChip = subChip && chipVisible(subChip, mode, q);
          const subTiles = list.filter((t) => tileVisible(t, mode, q));
          if (!showSubChip && !subTiles.length) continue;
          catHTML += '<div class="sub-group"><div class="sub-title">' + esc(sub) + ' <span style="font-weight:400;color:#94a3b8;">(' + list.length + ')</span></div>' +
            '<div class="grid">' + (showSubChip ? chipCardHTML(subChip) : '') + subTiles.map(tileCardHTML).join('') + '</div></div>';
        }
        if (!catHTML) continue;
        colHTML += '<div class="cat-group">' +
          (cat ? '<div class="cat-title">' + esc(cat) + '</div>' : '') + catHTML + '</div>';
      }
      if (!colHTML) continue;
      html += '<section class="col-section"><div class="col-head"><h2>' + esc(colKey) + '</h2>' +
        '<span class="counts"><b>' + colTotal + '</b> tiles' +
        (colMissing ? ' · <b style="color:#b45309;">' + colMissing + '</b> missing' : '') +
        (colFailed ? ' · <b style="color:#b91c1c;">' + colFailed + '</b> failed' : '') +
        '</span></div>' + colHTML + '</section>';
    }
    board.innerHTML = html || '<div class="empty">Nothing matches.</div>';
  }

  function updateStat() {
    const el = document.getElementById('stat');
    const tMiss = TILES.filter((t) => tileState(t) === 'missing').length;
    const tFail = TILES.filter((t) => tileState(t) === 'failed').length;
    const tDone = TILES.filter((t) => !!t.imageKey).length;
    const cDone = CHIPS.filter((c) => !!c.imageKey).length;
    if (MODE === 'style') {
      el.innerHTML = '<b>' + esc(STYLE_INFO ? STYLE_INFO.label : '') + '</b> — tiles <b>' + tDone + '</b>/' + TILES.length +
        (tMiss ? ' <span class="warn">(' + tMiss + ' missing)</span>' : '') +
        (tFail ? ' <span class="warn">(' + tFail + ' failed)</span>' : '') +
        ' · chips <b>' + cDone + '</b>/' + CHIPS.length +
        (CHIPS.length - cDone ? ' <span class="warn">(' + (CHIPS.length - cDone) + ' to go)</span>' : '');
    } else {
      const personal = TILES.filter((t) => !t.defaultable).length;
      el.innerHTML = '<b>' + TILES.length + '</b> tiles · <b>' + tDone + '</b> default images · ' +
        '<span class="warn"><b>' + tMiss + '</b> missing</span> · <b>' + personal + '</b> personalized · ' +
        '📁 <b>' + cDone + '</b>/' + CHIPS.length + ' folder icons' +
        (CHIPS.length - cDone ? ' <span class="warn">(' + (CHIPS.length - cDone) + ' missing)</span>' : '');
    }
  }

  function updateModeUI() {
    const style = MODE === 'style';
    document.getElementById('push-defaults').hidden = style;
    document.getElementById('gen-tiles').hidden = !style;
    document.getElementById('gen-chips').hidden = !style;
    document.getElementById('regen-all').hidden = !style;
    const warn = document.getElementById('ref-warn');
    warn.hidden = !(style && STYLE_INFO && (!STYLE_INFO.personRefKey || !STYLE_INFO.stuffRefKey));
  }

  // ── Load ──────────────────────────────────────────────────────────────
  async function loadStyles() {
    try {
      const d = await api('/api/admin/style-guides');
      STYLES = d.styleGuides || [];
    } catch (_) { STYLES = []; }
    const sel = document.getElementById('style-picker');
    const want = new URLSearchParams(location.search).get('styleGuideId') || '';
    sel.innerHTML = '<option value="">Generic (unstyled)</option>' +
      STYLES.map((s) => '<option value="' + s.id + '">' + esc(s.label) + (s.active ? '' : ' (inactive)') + '</option>').join('');
    if (want && STYLES.some((s) => String(s.id) === String(want))) sel.value = want;
  }

  async function load() {
    const board = document.getElementById('board');
    board.innerHTML = '<div class="empty">Loading the default board…</div>';
    const id = styleGuideId();
    MODE = id ? 'style' : 'generic';
    try {
      if (id) {
        const d = await api('/api/admin/lab?action=style-defaults&styleGuideId=' + id);
        STYLE_INFO = d.style || null;
        TILES = d.tiles || [];
        CHIPS = (d.chips || []).map((c) => ({ ...c, parent: c.parent || '' }));
      } else {
        const d = await api('/api/admin/lab?action=defaults-view');
        STYLE_INFO = null;
        TILES = (d.tiles || []).map((t) => ({ ...t, status: null, error: null }));
        // Generic folders have no parent info — chip lookup falls back to
        // section+label, matching the old flat folder list.
        CHIPS = (d.folders || []).map((f) => ({ section: f.section, label: f.label, parent: null, imageKey: f.imageKey || null, status: null, error: null }));
      }
      updateModeUI();
      updateStat();
      render();
    } catch (e) {
      board.innerHTML = '<div class="empty">' + esc(e.message || e) + '</div>';
      document.getElementById('stat').textContent = 'Error';
      updateModeUI();
    }
  }

  // ── Generic mode: the existing chunked seed-defaults Push loop ────────
  async function pushLoop(mode) {
    let offset = 0, processed = 0, total = 0;
    for (let i = 0; i < 200; i++) {
      const r = await apiPost('/api/admin/lab?action=seed-defaults&mode=' + mode + '&offset=' + offset);
      total = r.total || 0; processed += r.processed || 0;
      document.getElementById('stat').textContent = 'Pushing ' + mode + ': ' + r.nextOffset + '/' + total + '…';
      if (r.done || r.nextOffset <= offset) break;
      offset = r.nextOffset;
    }
    return { processed, total };
  }
  document.getElementById('push-defaults').addEventListener('click', async () => {
    const btn = document.getElementById('push-defaults');
    if (!confirm('Push the reference board (Fletcher’s) into the shared defaults?\n\nCopies tile art + folder icons that are missing a default. Every board — new and existing — reads these live. Safe to re-run.')) return;
    btn.disabled = true;
    try {
      const t = await pushLoop('populate');
      const f = await pushLoop('cats');
      alert('Pushed ' + t.processed + ' of ' + t.total + ' tile defaults + ' + f.processed + ' of ' + f.total + ' folder icons.');
      await load();
    } catch (e) {
      alert('Push failed: ' + (e.message || e));
    } finally { btn.disabled = false; }
  });

  // ── Style mode: chunked bulk generation ───────────────────────────────
  function setBusy(b) {
    BUSY = b;
    for (const id of ['gen-tiles', 'gen-chips', 'regen-all', 'refresh', 'push-defaults', 'style-picker']) {
      document.getElementById(id).disabled = b;
    }
  }
  async function bulkLoop(kind, force) {
    const id = styleGuideId();
    const progress = document.getElementById('progress');
    let offset = 0, generated = 0, skipped = 0, failed = 0, total = 0;
    for (let i = 0; i < 5000; i++) {
      const r = await apiPost('/api/admin/lab?action=style-defaults',
        { styleGuideId: id, op: 'generate', kind, offset, limit: 3, force: !!force });
      total = r.total || 0; generated += r.generated || 0; skipped += r.skipped || 0; failed += r.failed || 0;
      progress.textContent = '🎨 ' + kind + ': ' + r.next + ' of ' + total +
        ' — ' + generated + ' generated, ' + skipped + ' skipped' + (failed ? ', ' + failed + ' failed' : '');
      if (r.done || r.next <= offset) break;
      offset = r.next;
    }
    return { generated, skipped, failed, total };
  }
  async function runBulk(kinds, force) {
    if (BUSY) return;
    setBusy(true);
    const progress = document.getElementById('progress');
    try {
      const parts = [];
      for (const kind of kinds) {
        const r = await bulkLoop(kind, force);
        parts.push(kind + ': ' + r.generated + ' generated, ' + r.skipped + ' skipped' + (r.failed ? ', ' + r.failed + ' FAILED' : '') + ' of ' + r.total);
      }
      progress.textContent = '✓ Done — ' + parts.join(' · ');
      await load();
    } catch (e) {
      progress.textContent = '✗ ' + (e.message || e);
    } finally { setBusy(false); }
  }
  document.getElementById('gen-tiles').addEventListener('click', () => runBulk(['tiles'], false));
  document.getElementById('gen-chips').addEventListener('click', () => runBulk(['chips'], false));
  document.getElementById('regen-all').addEventListener('click', () => {
    if (!confirm('Regenerate EVERY tile and chip for this style?\n\nThis re-renders the whole set (existing art is replaced) and costs a generation per image. It can take a long while — leave this tab open.')) return;
    runBulk(['tiles', 'chips'], true);
  });

  // ── Per-image regenerate (style mode) ─────────────────────────────────
  document.getElementById('board').addEventListener('click', async (ev) => {
    const btn = ev.target.closest('.regen');
    if (!btn || MODE !== 'style') return;
    const card = btn.closest('.card');
    if (!card || card.classList.contains('busy')) return;
    card.classList.add('busy');
    const id = styleGuideId();
    try {
      let r;
      if (btn.dataset.kind === 'tile') {
        r = await apiPost('/api/admin/lab?action=style-defaults', { styleGuideId: id, op: 'regen', taxonomyId: btn.dataset.id });
        const t = TILES.find((x) => String(x.id) === String(btn.dataset.id));
        if (t) { t.imageKey = r.imageKey; t.status = 'done'; t.error = null; }
      } else {
        const chip = { section: btn.dataset.sec, label: btn.dataset.lbl, parent: btn.dataset.par || '' };
        r = await apiPost('/api/admin/lab?action=style-defaults', { styleGuideId: id, op: 'regen', chip });
        const c = CHIPS.find((x) => x.section === chip.section && norm(x.label) === norm(chip.label) && norm(x.parent) === norm(chip.parent));
        if (c) { c.imageKey = r.imageKey; c.status = 'done'; c.error = null; }
      }
      updateStat();
      render(); // swap in the new imageKey
    } catch (e) {
      card.classList.remove('busy');
      alert('Regenerate failed: ' + (e.message || e));
    }
  });

  // ── Wiring ────────────────────────────────────────────────────────────
  document.getElementById('style-picker').addEventListener('change', () => {
    const id = styleGuideId();
    const url = new URL(location.href);
    if (id) url.searchParams.set('styleGuideId', String(id));
    else url.searchParams.delete('styleGuideId');
    history.replaceState(null, '', url);
    load();
  });
  document.getElementById('filter').addEventListener('change', render);
  document.getElementById('q').addEventListener('input', render);
  document.getElementById('refresh').addEventListener('click', load);

  (async () => { await loadStyles(); await load(); })();
</script>
</body>
</html>
